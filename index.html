<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Gestion Stockage Automatisé</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Gestion du Stockage Automatisé</h1>
</header>

<div class="container">


<section>

<h2>Recherche de composants</h2>

<input type="text" id="search" placeholder="Nom ou référence du composant">
<button onclick="searchComposants()">Rechercher</button>
<button onclick="loadComposants()">Afficher tous</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Nom</th>
<th>Référence</th>
<th>Masse</th>
<th>Quantité</th>
</tr>
</thead>

<tbody id="tableComposants"></tbody>

</table>
  
<h2>Commande système</h2>

<button onclick="envoyerOrdre()">Envoyer ordre</button>
<p id="etatOrdre">Etat : inconnu</p>
</section>


<section>

<h2>Boîtes présentes</h2>
<button onclick="loadBoites()">Actualiser</button>

<table>

<thead>
<tr>
<th>Numéro</th>
<th>RFID</th>
<th>Emplacement</th>
<th>Masse</th>
</tr>
</thead>

<tbody id="tableBoites"></tbody>

</table>

</section>


</div>

<script type="module" src="script.js"></script>

</body>
</html>
