<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Gestion Stockage Automatisé</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Gestion du Stockage Automatisé</h1>
</header>

<div class="container">

<section>
<h2>Recherche de composants</h2>

<input type="text" id="search" placeholder="Nom ou référence composant">
<button onclick="searchComposants()">Rechercher</button>

<div id="resultats"></div>
</section>


<section>
<h2>Boîtes présentes</h2>
<button onclick="loadBoites()">Actualiser</button>

<table>
<thead>
<tr>
<th>Numéro</th>
<th>RFID</th>
<th>Emplacement</th>
<th>Masse</th>
</tr>
</thead>

<tbody id="boites"></tbody>
</table>

</section>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
